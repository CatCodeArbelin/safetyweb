services:
  safe-check:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /tmp/zapretvless
    volumes:
      - .:/workspace:ro
    command: >
      sh -c "cp -R /workspace /tmp/zapretvless && dotnet --info && dotnet restore src/Arbelin.One.Tests/Arbelin.One.Tests.csproj && dotnet test src/Arbelin.One.Tests/Arbelin.One.Tests.csproj --no-restore"
